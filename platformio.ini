; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ============================================================================
; Environnement par défaut : FP1 + FP2 combinés (pipeline complet NeuralSpeech)
; DAC0 sort le signal filtré. Utilisé pour la démo finale et la plupart des tests.
; ============================================================================
[env:due]
platform = atmelsam
board = due
framework = arduino

; -O2 à la place du -Os Arduino par défaut.
; IMPORTANT : le framework Arduino-PIO concatène ses flags APRÈS nos build_flags
; dans la ligne de compilation (→ `... -O2 ... -Os ...`), donc le dernier -O
; gagne et -Os écrase notre -O2 silencieusement. Solution : build_unflags retire
; -Os du framework AVANT d'appliquer notre -O2.
; Gain mesuré sur filter_sample() : ~73 µs (-Os) → ~8 µs (-O2).
build_unflags = -Os
build_flags   = -O2

; Baudrate utilisé par le firmware (src/main.cpp — SERIAL_BAUDRATE)
; Le monitor PlatformIO doit démarrer à la même vitesse.
monitor_speed = 250000
monitor_filters = default, time

; ============================================================================
; Environnement FP1 seul : ADC + DAC brut, SANS filtre.
; Utilisé pour la validation ET1 et notamment la démo de repliement spectral
; à 17 kHz (alias à 15 kHz) qui motive la nécessité du filtre FP2.
;
; Upload :  pio run -e due_fp1 --target upload
; Retour au pipeline complet : pio run -e due --target upload
; ============================================================================
[env:due_fp1]
platform = atmelsam
board = due
framework = arduino
build_unflags = -Os
build_flags   = -O2 -DFP1_PURE=1
monitor_speed = 250000
monitor_filters = default, time
