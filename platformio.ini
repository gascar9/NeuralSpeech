; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:due]
platform = atmelsam
board = due
framework = arduino

; -O2 à la place du -Os Arduino par défaut.
; Le SAM3X8E n'a pas de FPU : -Os favorisait la taille mais pénalisait les
; boucles entières (déroulage inhibé). -O2 active le loop-unrolling partiel
; et améliore le scheduling des instructions MUL sur Cortex-M3.
build_flags = -O2

; Baudrate utilisé par le firmware (src/main.cpp — SERIAL_BAUDRATE)
; Le monitor PlatformIO doit démarrer à la même vitesse.
monitor_speed = 250000
monitor_filters = default, time
