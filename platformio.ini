; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ============================================================================
; Environnement par défaut : FP1 + FP2 combinés (pipeline complet NeuralSpeech)
; DAC0 sort le signal filtré. Utilisé pour la démo finale et la plupart des tests.
; ============================================================================
[env:due]
platform = atmelsam
board = due
framework = arduino

; -O2 à la place du -Os Arduino par défaut.
; Le SAM3X8E n'a pas de FPU : -Os favorisait la taille mais pénalisait les
; boucles entières (déroulage inhibé). -O2 active le loop-unrolling partiel
; et améliore le scheduling des instructions MUL sur Cortex-M3.
build_flags = -O2

; Baudrate utilisé par le firmware (src/main.cpp — SERIAL_BAUDRATE)
; Le monitor PlatformIO doit démarrer à la même vitesse.
monitor_speed = 250000
monitor_filters = default, time

; ============================================================================
; Environnement FP1 seul : ADC + DAC brut, SANS filtre.
; Utilisé pour la validation ET1 et notamment la démo de repliement spectral
; à 17 kHz (alias à 15 kHz) qui motive la nécessité du filtre FP2.
;
; Upload :  pio run -e due_fp1 --target upload
; Retour au pipeline complet : pio run -e due --target upload
; ============================================================================
[env:due_fp1]
platform = atmelsam
board = due
framework = arduino
build_flags = -O2 -DFP1_PURE=1
monitor_speed = 250000
monitor_filters = default, time
